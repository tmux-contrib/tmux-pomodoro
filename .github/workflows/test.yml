name: Test

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Run Plugin Tests
        run: nix develop --command bats tests/

      - name: Run Rust Tests
        run: cd crates/pomodoro && nix develop . --command cargo test
