name: release
on:
  push:
    branches: [main]
permissions:
  contents: write
  id-token: write
  pull-requests: write
jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .github/config/release-please-config.json
          manifest-file: .github/config/release-please-manifest.json
  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --manifest-path crates/pomodoro/Cargo.toml --target ${{ matrix.target }}
      - run: |
          mv crates/pomodoro/target/${{ matrix.target }}/release/pomodoro \
             pomodoro-${{ matrix.target }}
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: pomodoro-${{ matrix.target }}
  update-flake:
    needs: [release-please, build]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Update hashes in flake.nix
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: python3 .github/scripts/update-flake-hashes.py "${TAG}"
      - name: Commit and push updated flake.nix
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "chore: update flake.nix hashes for ${TAG} [skip ci]"
          git push
